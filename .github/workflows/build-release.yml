name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build for release
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1  #https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md#xcode
        with:
          xcode-version: '26.5'
      - name: Lint
        run: swift format lint --strict --recursive Sources Tests sample/Sources
      - name: Test
        run: swift test
      - name: Send Release Alert
        run: swift run --package-path sample sample --release
        env:
          APIALERTS_API_KEY: ${{ secrets.APIALERTS_API_KEY }}

  linux:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Build
        run: swift build
      - name: Test
        run: swift test
