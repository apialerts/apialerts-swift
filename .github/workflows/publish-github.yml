name: Publish

on:
  release:
    types: [created]

jobs:
  build:
    name: Publish
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1  #https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md#xcode
        with:
          xcode-version: '16.0'
      - name: Send Publish Alert
        run: swift run --package-path sample -- --publish
        env:
          APIALERTS_API_KEY: ${{ secrets.APIALERTS_API_KEY }}
